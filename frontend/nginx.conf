worker_processes 1;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout  65;
  gzip on;

  # Use Docker's internal DNS and re-resolve every 5 s
  # This prevents stale IPs when api-server restarts
  resolver 127.0.0.11 valid=5s ipv6=off;

  server {
    listen       80;
    server_name  album.abadgroup.tech;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests — variable forces DNS re-resolution via resolver above
    location /api/ {
      set $api_backend "api-server";
      proxy_pass http://$api_backend:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|svg|ico|woff2?)$ {
      expires 30d;
      add_header Cache-Control "public";
    }
  }
}
